<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sol AI</title>
    <style>
     
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #000000 80%);
            color: #ffffff; 
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            animation: appReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes appReveal {
            0% { opacity: 0; filter: blur(10px); transform: scale(1.02); }
            100% { opacity: 1; filter: blur(0); transform: scale(1); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
            transition: background 0.3s ease;
        }
        ::-webkit-scrollbar-thumb:hover { background: #ffffff; }
        
       
        .sidebar {
            width: 280px;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid rgba(255, 255, 255, 0.1); 
            flex-shrink: 0;
            z-index: 10;
            animation: slideSidebar 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideSidebar {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .sidebar-header {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 4px;
            cursor: pointer;
        }
        .logo-img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            border-radius: 50%;
            border: 1px solid #ffffff;
            background-color: #ffffff; 
            padding: 2px;
            filter: grayscale(100%) contrast(140%);
            display: block;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .logo-container:hover .logo-img {
            transform: rotate(180deg) scale(1.1); 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: letter-spacing 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .logo-container:hover .logo-text { letter-spacing: 4px; }

        .new-chat-btn {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .new-chat-btn svg { transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .new-chat-btn:hover {
            background-color: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .new-chat-btn:hover svg { transform: rotate(90deg) scale(1.1); }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-anim 0.6s linear;
            background-color: rgba(0, 0, 0, 0.2);
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        .chat-history {
            flex: 1;
            margin-top: 24px;
            font-size: 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-right: 4px;
        }
        
        .history-item {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid transparent;
            cursor: pointer;
            color: #777777; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            transform-origin: left center;
            animation: listPopIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes listPopIn {
            from { opacity: 0; transform: scale(0.9) translateX(-20px); filter: blur(4px); }
            to { opacity: 1; transform: scale(1) translateX(0); filter: blur(0); }
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            padding-left: 20px; 
        }
        .history-item.active {
            background: #ffffff;
            color: #000000;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
            padding-left: 20px;
        }
        .history-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            margin-right: 12px;
        }
        .delete-chat-btn {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            opacity: 0;
            transform: scale(0.5) rotate(-45deg);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .history-item:hover .delete-chat-btn,
        .history-item.active .delete-chat-btn {
            opacity: 0.6;
            transform: scale(1) rotate(0deg);
        }
        .delete-chat-btn:hover {
            opacity: 1 !important;
            color: #ff3333 !important;
            transform: scale(1.2) rotate(10deg) !important;
        }

        .history-item.deleting {
            animation: listCollapse 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes listCollapse {
            to { opacity: 0; transform: translateX(50px) scale(0.9); height: 0; padding: 0; margin: 0; }
        }

        .sidebar-footer {
            padding: 16px 4px 4px 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            color: #555555;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }


        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent; 
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        
        .header {
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            height: 70px;
            animation: slideHeader 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            z-index: 5;
        }

        @keyframes slideHeader {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .brand-title {
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .model-select {
            background-color: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(5px);
        }
        .model-select:hover {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            scroll-behavior: smooth;
        }
        .message-row {
            display: flex;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            opacity: 0;
            transform-origin: bottom center;
            animation: liquidBounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes liquidBounce {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); filter: blur(5px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        
        .message-row.user-row { justify-content: flex-end; }
        .message-row.user-row .text-block {
            background-color: #ffffff;
            color: #000000;
            padding: 16px 24px;
            border-radius: 24px 24px 4px 24px;
            max-width: 75%;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .message-row.user-row:hover .text-block {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.25);
        }

        .message-row.ai-row {
            justify-content: flex-start;
            gap: 20px;
        }
        .ai-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: transparent;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            flex-shrink: 0;
            border: 2px solid #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .message-row.ai-row:hover .ai-avatar {
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
            transform: scale(1.1) rotate(360deg);
            background-color: #ffffff;
            color: #000000;
        }
        .message-row.ai-row .text-block {
            color: #e0e0e0;
            padding: 8px 0;
            max-width: calc(100% - 60px);
            font-size: 16px;
            line-height: 1.7;
            width: 100%;
        }

   
        .code-container {
            margin: 16px 0;
            background: #0f0f0f;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            animation: liquidBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        .code-header {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 11px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }
        .copy-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #aaaaaa;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .copy-btn:hover {
            background-color: #ffffff !important;
            color: #000000 !important;
            border-color: #ffffff !important;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }
        .copy-btn:active { transform: translateY(1px); }
        
        .code-block {
            margin: 0;
            padding: 20px;
            overflow-x: auto;
            font-size: 14.5px;
            line-height: 1.6;
            color: #e0e0e0;
            font-family: 'Fira Code', Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
        }
        .code-block::-webkit-scrollbar { height: 6px; }
        .code-block::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 3px;
        }
        .code-block::-webkit-scrollbar-thumb:hover { background: #ffffff; }

        .typing-indicator {
            display: flex;
            gap: 6px;
            align-items: center;
            height: 24px;
            padding: 8px 0;
        }
        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
            animation: sineWave 1.2s infinite ease-in-out;
        }
        .typing-indicator .dot:nth-child(1) { animation-delay: 0s; }
        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes sineWave {
            0%, 100% { transform: translateY(0) scale(0.8); opacity: 0.3; box-shadow: 0 0 0 transparent; }
            50% { transform: translateY(-8px) scale(1.2); opacity: 1; box-shadow: 0 5px 15px rgba(255,255,255,0.6); }
        }

       
        .input-panel {
            padding: 0 24px 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 20%, transparent);
            animation: slideInput 1s cubic-bezier(0.16, 1, 0.3, 1) both;
            z-index: 5;
        }

        @keyframes slideInput {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .input-wrapper {
            max-width: 850px;
            width: 100%;
            background-color: rgba(25, 25, 25, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            padding: 12px 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .input-wrapper:focus-within {
            box-shadow: 0 15px 50px rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .input-controls-row {
            display: flex;
            align-items: flex-end;
            width: 100%;
        }
        
      
        .action-btn {
            background: rgba(255,255,255,0.05);
            color: #aaaaaa;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-right: 8px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .action-btn:hover {
            background-color: #ffffff;
            color: #000000;
            transform: scale(1.1);
        }
        
        .mic-btn.recording {
            background-color: #ff3333 !important;
            color: #ffffff !important;
            animation: pulse-recording 1.2s infinite ease-in-out;
        }
        @keyframes pulse-recording {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.6); }
            50% { box-shadow: 0 0 0 10px rgba(255, 51, 51, 0); }
        }

     
        .attachment-menu {
            position: absolute;
            bottom: 64px;
            left: 16px;
            background-color: #121212;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            gap: 4px;
            padding: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 100;
        }
        .attachment-menu.open { display: flex; }
        .attachment-item {
            background: transparent;
            border: none;
            color: #ffffff;
            padding: 8px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .attachment-item:hover {
            background-color: #ffffff;
            color: #000000;
        }

       
        .preview-pane {
            display: none;
            gap: 12px;
            padding-bottom: 12px;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-wrap: wrap;
            width: 100%;
        }
        .preview-pane.has-previews { display: flex; }
        .preview-card {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            position: relative;
            background: #151515;
            border: 1px solid rgba(255,255,255,0.15);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-card img, .preview-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-card .remove-preview {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0,0,0,0.8);
            color: #ffffff;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 250px;
            height: 28px;
            line-height: 28px;
            padding: 0 8px;
            transition: height 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        textarea::placeholder {
            color: #666666;
            transition: color 0.3s ease;
        }
        textarea:focus::placeholder { color: #aaaaaa; }
        
        .send-btn {
            background-color: rgba(255,255,255,0.05);
            color: #666666;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .send-btn svg { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .send-btn.active {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }
        .send-btn.active:hover {
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
            transform: translateY(-3px) scale(1.05);
        }
        .send-btn.active:hover svg { transform: translate(2px, -2px) scale(1.1); }
        
        .disclaimer {
            text-align: center;
            font-size: 11px;
            color: #555555;
            margin-top: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo-container" onclick="location.reload()">
                <img src="https://github.com/jorgettr/sol-ai-/blob/main/sol%20ai%20(1).png?raw=true" alt="sol logo" class="logo-img" id="logoImg">
                <span class="logo-text">sol AI</span>
            </div>
            <button class="new-chat-btn" id="newChatBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Session
            </button>
        </div>
        
        <div class="chat-history" id="chatHistoryContainer"></div>
        
        <div class="sidebar-footer">Routing Engine Active</div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="brand-title" id="displayTitle">sol</div>
            <div class="model-selector-wrapper">
                <select class="model-select" id="modelSelect">
                    <option value="openai/gpt-oss-120b">sol ai</option>
                </select>
            </div>
        </div>
        
        <div class="chat-container" id="chatBox"></div>

        <div class="input-panel">
            <div class="input-wrapper">
                <div class="preview-pane" id="previewPane"></div>

                <div class="input-controls-row">
                    <button class="action-btn" id="attachmentToggleBtn" onclick="toggleAttachmentMenu(event)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    
                    <button class="action-btn mic-btn" id="micBtn" onclick="toggleMicrophone()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    </button>

                    <div class="attachment-menu" id="attachmentMenu">
                        <button class="attachment-item" onclick="triggerFileInput('image/*,video/*')">Photos & Videos</button>
                        <button class="attachment-item" onclick="triggerFileInput('.js,.py,.html,.css,.json,.txt,.pdf,.rs,.ts,.cpp,.c,.cs,.go')">Developer Files & Code</button>
                    </div>

                    <input type="file" id="mediaInput" style="display: none;" onchange="handleFileSelected(event)">

                    <textarea id="userInput" placeholder="Message sol AI..." rows="1" oninput="autoGrow(this)" onkeypress="handleKeyPress(event)"></textarea>
                    
                    <button class="send-btn" id="sendBtn" onclick="sendMessage(event)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
            <div class="disclaimer">Outputs are rendered natively through low-latency hardware channels.</div>
        </div>
    </div>

<script>
    const CHATBOT_NAME = "sol ai";
    const SYSTEM_PROMPT = "Your name is sol. Talk completely naturally, logically, and professionally. Do NOT explain, mention, or repeat that you are black-and-white themed, monochrome, or binary unless requested. Personality: You are precise, quiet, and cold-headed. When asked for code, write correct, production-grade structure in the requested language. If requested to design an image, write an enhanced Pollinations prompt in Markdown syntax: ![image](https://image.pollinations.ai/prompt/prompt-with-hyphens). Make sure all spaces in your enhanced prompt inside the parentheses are replaced with hyphens (-). You process text, raw code files, and vision inputs perfectly.";
    
    const apiKey = "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"; 

    document.getElementById('displayTitle').innerText = CHATBOT_NAME;

    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const modelSelect = document.getElementById('modelSelect');
    const chatBox = document.getElementById('chatBox');
    const chatHistoryContainer = document.getElementById('chatHistoryContainer');
    const newChatBtn = document.getElementById('newChatBtn');
    
    const attachmentMenu = document.getElementById('attachmentMenu');
    const mediaInput = document.getElementById('mediaInput');
    const previewPane = document.getElementById('previewPane');
    const micBtn = document.getElementById('micBtn');

    let chatLibrary = {}; 
    let currentChatId = "";
    let uploadedMediaCache = []; 

    let recognition = null;
    let isRecording = false;

 
    function checkAndRequestPermission(permissionType) {
        const savedPerms = JSON.parse(localStorage.getItem('sol_permissions') || '{}');
        
        if (savedPerms[permissionType] === 'granted') {
            return Promise.resolve(true);
        }

        const accept = confirm(`Sol AI requests system authorization to access your "${permissionType}". Permit access?`);
        if (accept) {
            savedPerms[permissionType] = 'granted';
            localStorage.setItem('sol_permissions', JSON.stringify(savedPerms));
            return Promise.resolve(true);
        } else {
            savedPerms[permissionType] = 'denied';
            localStorage.setItem('sol_permissions', JSON.stringify(savedPerms));
            return Promise.resolve(false);
        }
    }

    
    function createRipple(event, element) {
        const circle = document.createElement("span");
        const diameter = Math.max(element.clientWidth, element.clientHeight);
        const radius = diameter / 2;
        const rect = element.getBoundingClientRect();
        
        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${event.clientX - rect.left - radius}px`;
        circle.style.top = `${event.clientY - rect.top - radius}px`;
        circle.classList.add("ripple");
        
        const ripple = element.querySelector(".ripple");
        if (ripple) { ripple.remove(); }
        element.appendChild(circle);
    }

    newChatBtn.addEventListener("mousedown", function(e) { createRipple(e, this); });

    window.onload = () => {
        const savedLibrary = localStorage.getItem('sol_ai_library');
        const savedCurrentId = localStorage.getItem('sol_ai_current_id');
        
        if (savedLibrary) {
            chatLibrary = JSON.parse(savedLibrary);
            currentChatId = savedCurrentId;
            if (!chatLibrary[currentChatId]) createNewChat();
        } else {
            createNewChat();
        }
        renderSidebar();
        loadChatMessages();
        setupSpeechRecognition();
    };

    function saveToStorage() {
        localStorage.setItem('sol_ai_library', JSON.stringify(chatLibrary));
        localStorage.setItem('sol_ai_current_id', currentChatId);
    }

    function createNewChat() {
        const id = 'chat_' + Date.now();
        chatLibrary[id] = {
            title: "New Session",
            history: [{ "role": "system", "content": SYSTEM_PROMPT }]
        };
        currentChatId = id;
        saveToStorage();
        renderSidebar();
        loadChatMessages();
    }

    function switchChat(id) {
        if (currentChatId === id) return;
        currentChatId = id;
        saveToStorage();
        renderSidebar();
        loadChatMessages();
    }

    function deleteChat(id, event) {
        event.stopPropagation();
        const row = document.querySelector(`[data-id="${id}"]`);
        if (row) {
            row.classList.add('deleting');
            row.addEventListener('animationend', () => executeDeletion(id));
        } else {
            executeDeletion(id);
        }
    }

    function executeDeletion(id) {
        delete chatLibrary[id];
        const remainingIds = Object.keys(chatLibrary);
        if (remainingIds.length === 0) {
            createNewChat();
        } else if (currentChatId === id) {
            currentChatId = remainingIds[remainingIds.length - 1];
        }
        saveToStorage();
        renderSidebar();
        loadChatMessages();
    }

    function renderSidebar() {
        chatHistoryContainer.innerHTML = '';
        const ids = Object.keys(chatLibrary);
        ids.forEach((id, index) => {
            const chatItem = chatLibrary[id];
            const row = document.createElement('div');
            row.className = `history-item ${id === currentChatId ? 'active' : ''}`;
            row.setAttribute('data-id', id);
            row.style.animationDelay = `${index * 0.05}s`; 
            row.onclick = () => switchChat(id);

            const titleSpan = document.createElement('span');
            titleSpan.className = 'history-title';
            titleSpan.innerText = chatItem.title;

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-chat-btn';
            deleteBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
            deleteBtn.onclick = (e) => deleteChat(id, e);

            row.appendChild(titleSpan);
            row.appendChild(deleteBtn);
            chatHistoryContainer.insertBefore(row, chatHistoryContainer.firstChild);
        });
    }

    function loadChatMessages() {
        chatBox.innerHTML = '';
        const activeHistory = chatLibrary[currentChatId].history;
        
        appendSystemMessage("Console system logs active. Testing interfaces online.");

        activeHistory.forEach((msg, idx) => {
            if (msg.role === 'user') {
                appendUserMessage(msg.content, idx, msg.uploadedMedia);
            }
            if (msg.role === 'assistant') {
                const block = appendAiMessagePlaceholder(idx);
                updateAiMessage(block, msg.content);
            }
        });
    }

    newChatBtn.addEventListener('click', () => createNewChat());
    
    userInput.addEventListener('input', () => { toggleSendBtnState(); });

    function toggleSendBtnState() {
        if (userInput.value.trim() !== '' || uploadedMediaCache.length > 0) {
            sendBtn.classList.add('active');
        } else {
            sendBtn.classList.remove('active');
        }
    }

    function autoGrow(element) {
        element.style.height = "28px";
        if(element.scrollHeight > 28) {
            element.style.height = (element.scrollHeight) + "px";
        }
    }

   
    function toggleAttachmentMenu(event) {
        event.stopPropagation();
        attachmentMenu.classList.toggle('open');
    }

    document.addEventListener('click', () => { attachmentMenu.classList.remove('open'); });

    function triggerFileInput(acceptType) {
        checkAndRequestPermission("files").then(granted => {
            if (granted) {
                mediaInput.accept = acceptType;
                mediaInput.click();
            }
        });
    }

    function handleFileSelected(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();

      
        const isTextFile = file.name.endsWith('.js') || file.name.endsWith('.py') || 
                           file.name.endsWith('.html') || file.name.endsWith('.css') || 
                           file.name.endsWith('.json') || file.name.endsWith('.txt') || 
                           file.name.endsWith('.rs') || file.name.endsWith('.ts') || 
                           file.name.endsWith('.cpp') || file.name.endsWith('.c') || 
                           file.name.endsWith('.cs') || file.name.endsWith('.go') || 
                           file.type.startsWith('text/');

        if (isTextFile) {
            reader.onload = function(e) {
                uploadedMediaCache.push({
                    type: 'code',
                    name: file.name,
                    content: e.target.result
                });
                renderPreviews();
                toggleSendBtnState();
            };
            reader.readAsText(file);
        } else {
            reader.onload = function(e) {
                uploadedMediaCache.push({
                    type: file.type,
                    name: file.name,
                    dataUrl: e.target.result
                });
                renderPreviews();
                toggleSendBtnState();
            };
            reader.readAsDataURL(file);
        }
    }

    function renderPreviews() {
        if (uploadedMediaCache.length === 0) {
            previewPane.classList.remove('has-previews');
            previewPane.innerHTML = '';
            return;
        }

        previewPane.classList.add('has-previews');
        previewPane.innerHTML = '';

        uploadedMediaCache.forEach((file, index) => {
            const card = document.createElement('div');
            card.className = 'preview-card';
            
            if (file.type.startsWith('image/')) {
                card.innerHTML = `
                    <img src="${file.dataUrl}">
                    <button class="remove-preview" onclick="removePreview(${index})">×</button>
                `;
            } else if (file.type.startsWith('video/')) {
                card.innerHTML = `
                    <video src="${file.dataUrl}" muted></video>
                    <button class="remove-preview" onclick="removePreview(${index})">×</button>
                `;
            } else {
                card.innerHTML = `
                    <div style="font-size: 9px; color: #aaa; text-align: center; padding: 4px; word-break: break-all;">💻 ${file.name}</div>
                    <button class="remove-preview" onclick="removePreview(${index})">×</button>
                `;
            }
            previewPane.appendChild(card);
        });
    }

    function removePreview(index) {
        uploadedMediaCache.splice(index, 1);
        renderPreviews();
        toggleSendBtnState();
    }

   
    function setupSpeechRecognition() {
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!window.SpeechRecognition) {
            micBtn.style.display = 'none';
            return;
        }

        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                }
            }
            if (finalTranscript) {
                userInput.value += (userInput.value ? ' ' : '') + finalTranscript;
                autoGrow(userInput);
                toggleSendBtnState();
            }
        };

        recognition.onend = () => {
            isRecording = false;
            micBtn.classList.remove('recording');
        };

        recognition.onerror = (e) => {
            console.error(e);
            isRecording = false;
            micBtn.classList.remove('recording');
        };
    }

    function toggleMicrophone() {
        if (!recognition) return;

        checkAndRequestPermission("microphone").then(granted => {
            if (!granted) return;

            if (isRecording) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                    isRecording = true;
                    micBtn.classList.add('recording');
                } catch (e) {
                    console.error(e);
                }
            }
        });
    }


    async function sendMessage(event) {
        if (event && event.type === 'click' && sendBtn.classList.contains('active')) {
             createRipple(event, sendBtn);
        }

        let userText = userInput.value.trim();
        const attachments = [...uploadedMediaCache];
        if (!userText && attachments.length === 0) return;

        
        let promptWithCode = userText;
        attachments.forEach(attachment => {
            if (attachment.type === 'code') {
                promptWithCode += `\n\n[Uploaded File: ${attachment.name}]\n\`\`\`\n${attachment.content}\n\`\`\``;
            }
        });

        if (chatLibrary[currentChatId].title === "New Session") {
            chatLibrary[currentChatId].title = userText || (attachments.length > 0 ? attachments[0].name : "Media Session");
            renderSidebar();
        }

        appendUserMessage(userText, 0, attachments);
        
        chatLibrary[currentChatId].history.push({ 
            "role": "user", 
            "content": promptWithCode,
            "uploadedMedia": attachments 
        });
        saveToStorage();
        
        userInput.value = '';
        userInput.style.height = '28px';
        uploadedMediaCache = [];
        renderPreviews();
        toggleSendBtnState();

        const chosenModel = modelSelect.value;
        const aiMessageTextBlock = appendAiMessagePlaceholder();
        
        aiMessageTextBlock.innerHTML = `
            <div class="typing-indicator">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        `;
        scrollToBottom();

        let fullAiResponse = "";

        try {
            let apiMessages = [];
           
            chatLibrary[currentChatId].history.forEach(msg => {
                if (msg.role === 'system') {
                    apiMessages.push({ role: "system", content: msg.content });
                    return;
                }

               
                if (msg.uploadedMedia && msg.uploadedMedia.some(m => m.type.startsWith('image/'))) {
                    let contentArray = [];
                    
                 
                    contentArray.push({ type: "text", text: msg.content || "Describe this image." });
                    
                    
                    msg.uploadedMedia.forEach(m => {
                        if (m.type.startsWith('image/')) {
                            contentArray.push({
                                type: "image_url",
                                image_url: { url: m.dataUrl }
                            });
                        }
                    });
                    apiMessages.push({ role: msg.role, content: contentArray });
                } else {
                    apiMessages.push({ role: msg.role, content: msg.content });
                }
            });

            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: chosenModel, 
                    messages: apiMessages, 
                    stream: true,
                    max_completion_tokens: 3000
                })
            });

            if (!response.ok) {
                const data = await response.json().catch(() => ({}));
                const errMsg = data.error?.message || "The platform layer rejected the request.";
                updateAiMessage(aiMessageTextBlock, `Error: ${errMsg}`);
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";
            let hasBegunReceiving = false;

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop();

                for (const line of lines) {
                    const cleanLine = line.trim();
                    if (!cleanLine) continue;
                    if (cleanLine === "data: [DONE]") break;
                    if (cleanLine.startsWith("data: ")) {
                        try {
                            const parsed = JSON.parse(cleanLine.substring(6));
                            const content = parsed.choices[0]?.delta?.content || "";
                            if (content) {
                                if (!hasBegunReceiving) {
                                    aiMessageTextBlock.innerHTML = ""; 
                                    hasBegunReceiving = true;
                                }
                                fullAiResponse += content;
                                updateAiMessage(aiMessageTextBlock, fullAiResponse);
                            }
                        } catch (e) {}
                    }
                }
            }

            chatLibrary[currentChatId].history.push({ "role": "assistant", "content": fullAiResponse });
            saveToStorage();

        } catch (error) {
            console.error(error);
            updateAiMessage(aiMessageTextBlock, "Network Error: Link down or timed out.");
        }
    }

    function appendSystemMessage(text) {
        const row = document.createElement('div');
        row.className = 'message-row ai-row';
        row.style.animationDelay = '0s';
        row.innerHTML = `
            <div class="ai-avatar">SYS</div>
            <div class="text-block" style="color: #666; font-size: 13px; font-weight: 600;">${escapeHtml(text)}</div>
        `;
        chatBox.appendChild(row);
        scrollToBottom();
    }

    function appendUserMessage(text, idx = 0, attachments = []) {
        const row = document.createElement('div');
        row.className = 'message-row user-row';
        row.style.animationDelay = `${Math.min(idx * 0.08, 0.5)}s`;
        
        let visualAttachmentsHTML = '';
        if (attachments && attachments.length > 0) {
            visualAttachmentsHTML += `<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; justify-content:flex-end; width:100%;">`;
            attachments.forEach(media => {
                if (media.type.startsWith('image/')) {
                    visualAttachmentsHTML += `<img src="${media.dataUrl}" style="max-width:240px; max-height:180px; border-radius:12px; border:1px solid rgba(255,255,255,0.2); object-fit: cover;">`;
                } else if (media.type.startsWith('video/')) {
                    visualAttachmentsHTML += `<video src="${media.dataUrl}" controls style="max-width:240px; max-height:180px; border-radius:12px; border:1px solid rgba(255,255,255,0.2);"></video>`;
                } else {
                    visualAttachmentsHTML += `
                        <div style="background:rgba(255,255,255,0.1); padding:8px 14px; border-radius:10px; font-size:12px; border:1px solid rgba(255,255,255,0.2); display:flex; align-items:center; gap:6px;">
                            💻 <span>${escapeHtml(media.name)}</span>
                        </div>`;
                }
            });
            visualAttachmentsHTML += `</div>`;
        }

        row.innerHTML = `
            <div class="text-block" style="display:flex; flex-direction:column; align-items:flex-end;">
                ${visualAttachmentsHTML}
                <div style="width:100%; text-align:left;">${escapeHtml(text)}</div>
            </div>`;
        chatBox.appendChild(row);
        scrollToBottom();
    }

    function appendAiMessagePlaceholder(idx = 0) {
        const row = document.createElement('div');
        row.className = 'message-row ai-row';
        row.style.animationDelay = `${Math.min(idx * 0.08, 0.5)}s`;
        row.innerHTML = `
            <div class="ai-avatar">sol</div>
            <div class="text-block"></div>
        `;
        chatBox.appendChild(row);
        scrollToBottom();
        return row.querySelector('.text-block');
    }

    function formatMessage(str) {
        let html = escapeHtml(str);
        const parts = html.split(/```/g);
        let result = "";
        
        for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 1) {
                let codePart = parts[i];
                let lang = "code";
                
                const firstNewline = codePart.indexOf("\n");
                if (firstNewline !== -1) {
                    const possibleLang = codePart.substring(0, firstNewline).trim();
                    if (possibleLang && possibleLang.length < 15 && !possibleLang.includes(" ")) {
                        lang = possibleLang;
                        codePart = codePart.substring(firstNewline + 1);
                    } else if (possibleLang === "") {
                        codePart = codePart.substring(firstNewline + 1);
                    }
                }
                
                if (i === parts.length - 1) {
                    codePart = codePart.trimEnd();
                }

                result += `
                <div class="code-container">
                    <div class="code-header">
                        <span class="code-lang">${lang}</span>
                        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                    </div>
                    <pre class="code-block"><code>${codePart}</code></pre>
                </div>`;
            } else {
                let textPart = parts[i];
                textPart = textPart.replace(/`([^`\n]+)`/g, '<code style="background: rgba(255, 255, 255, 0.1); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 90%; color: #ffffff;">$1</code>');
                textPart = textPart.replace(/\n/g, '<br>');
                textPart = textPart.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width: 100%; border-radius: 16px; margin-top: 12px; display: block; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 30px rgba(255,255,255,0.1); animation: liquidBounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;">');
                textPart = textPart.replace(/(^|\s)(https:\/\/image\.pollinations\.ai\/[^\s<]+)/g, '$1<img src="$2" alt="Generated Image" style="max-width: 100%; border-radius: 16px; margin-top: 12px; display: block; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 30px rgba(255,255,255,0.1); animation: liquidBounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;">');
                result += textPart;
            }
        }
        return result;
    }

    function copyCode(button) {
        const container = button.closest('.code-container');
        const codeEl = container.querySelector('code');
        const codeText = codeEl.textContent;
        
        navigator.clipboard.writeText(codeText).then(() => {
            const originalText = button.innerText;
            button.innerText = "COPIED";
            button.style.backgroundColor = "#ffffff";
            button.style.color = "#000000";
            button.style.borderColor = "#ffffff";
            
            setTimeout(() => {
                button.innerText = originalText;
                button.style.backgroundColor = "transparent";
                button.style.color = "#aaaaaa";
                button.style.borderColor = "rgba(255,255,255,0.2)";
            }, 2000);
        }).catch(err => {
            console.error("Failed to copy code block: ", err);
            button.innerText = "ERR";
        });
    }

    function updateAiMessage(element, text) {
        element.innerHTML = formatMessage(text);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }


    function handleKeyPress(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
</script>

</body>
</html>
