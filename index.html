<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core AI Workspace (Groq Powered)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f1f5f9;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- SIDEBAR STYLE --- */
        #sidebar {
            width: 260px;
            background-color: #0f172a;
            border-right: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            padding: 15px;
            flex-shrink: 0;
        }

        #new-chat-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        #new-chat-btn:hover {
            background-color: #2563eb;
        }

        .history-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #chat-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-history-item {
            padding: 10px 12px;
            background-color: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s, color 0.2s;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-history-item:hover, .chat-history-item.active {
            background-color: #1e293b;
            color: #ffffff;
        }

        .delete-chat-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 0.8rem;
            display: none;
        }

        .chat-history-item:hover .delete-chat-btn {
            display: block;
        }

        .delete-chat-btn:hover {
            color: #ef4444;
        }

        /* --- MAIN CHAT AREA STYLE --- */
        #main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #0b0f19;
            height: 100%;
        }

        #top-bar {
            padding: 15px 20px;
            border-bottom: 1px solid #1e293b;
            background-color: #0f172a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-header {
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #chat-box {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message-wrapper {
            display: flex;
            width: 100%;
        }

        .message-wrapper.user {
            justify-content: flex-end;
        }

        .message-wrapper.ai {
            justify-content: flex-start;
        }

        .message {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 1rem;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user-message {
            background-color: #2563eb;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            background-color: #1e293b;
            color: #e2e8f0;
            border-bottom-left-radius: 2px;
            border: 1px solid #334155;
        }

        /* --- INPUT BOX --- */
        #input-container {
            padding: 20px 40px 30px 40px;
            background-color: #0b0f19;
        }

        #input-wrapper {
            display: flex;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px 12px;
            align-items: center;
            max-width: 850px;
            margin: 0 auto;
        }

        #user-input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 10px;
            font-size: 1rem;
            outline: none;
        }

        #user-input::placeholder {
            color: #64748b;
        }

        #send-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background-color: #2563eb;
        }

        #send-btn:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <button id="new-chat-btn" onclick="createNewChat()">
            ➕ New Chat
        </button>
        <div class="history-label">Chat History</div>
        <div id="chat-list">
            </div>
    </div>

    <div id="main-workspace">
        <div id="top-bar">
            <div id="chat-header">
                🤖 <span id="current-chat-title">Core AI Workspace</span>
            </div>
        </div>

        <div id="chat-box">
            </div>

        <div id="input-container">
            <div id="input-wrapper">
                <input type="text" id="user-input" placeholder="Ask Core AI anything (includes web search and code execution)..." autocomplete="off">
                <button id="send-btn" onclick="handleSend()">Send</button>
            </div>
        </div>
    </div>

<script>
    // Hardcoded Groq API Key
    const API_KEY = "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";

    // State Variables
    let chats = [
        {
            id: 1,
            title: "General Chat",
            messages: [
                { text: "Hello! Your custom Groq/Compound AI model is loaded and ready. How can I help you today?", sender: "ai" }
            ]
        }
    ];
    let currentChatId = 1;

    // DOM Elements
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const chatList = document.getElementById('chat-list');
    const currentChatTitle = document.getElementById('current-chat-title');
    const sendBtn = document.getElementById('send-btn');

    // Startup Init
    window.addEventListener('DOMContentLoaded', () => {
        updateSidebar();
        loadChat(currentChatId);
    });

    // Handle pressing Enter
    userInput.addEventListener("keypress", function(e) {
        if (e.key === "Enter") handleSend();
    });

    function createNewChat() {
        const newId = Date.now();
        const newChat = {
            id: newId,
            title: `New Chat ${chats.length + 1}`,
            messages: [
                { text: "Started a fresh conversation. Ask me anything!", sender: "ai" }
            ]
        };
        chats.unshift(newChat);
        currentChatId = newId;
        updateSidebar();
        loadChat(currentChatId);
    }

    function loadChat(id) {
        currentChatId = id;
        const activeChat = chats.find(c => c.id === id);
        currentChatTitle.textContent = activeChat.title;
        
        // Render messages
        chatBox.innerHTML = '';
        activeChat.messages.forEach(msg => {
            appendMessageHTML(msg.text, msg.sender === 'user' ? 'user' : 'ai');
        });

        // Toggle sidebar selection highlights
        document.querySelectorAll('.chat-history-item').forEach(item => {
            item.classList.remove('active');
        });
        const selectedElement = document.getElementById(`chat-item-${id}`);
        if (selectedElement) selectedElement.classList.add('active');

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;

        const activeChat = chats.find(c => c.id === currentChatId);

        // Update chat title based on user's first query
        if (activeChat.messages.length === 1 && activeChat.title.startsWith("New Chat")) {
            activeChat.title = text.substring(0, 20) + (text.length > 20 ? "..." : "");
            updateSidebar();
        }

        // Add user message
        activeChat.messages.push({ text: text, sender: 'user' });
        appendMessageHTML(text, 'user');
        userInput.value = '';

        // Add temporary loading indicator
        sendBtn.disabled = true;
        appendMessageHTML("Generating response (performing searches/code execution)... 🤖", 'ai', 'temp-loading');

        try {
            const aiResponseText = await fetchGroqResponse(activeChat.messages);
            
            // Remove loading message
            const loadingMsg = document.getElementById('temp-loading');
            if (loadingMsg) loadingMsg.remove();

            // Save and render response
            activeChat.messages.push({ text: aiResponseText, sender: 'ai' });
            appendMessageHTML(aiResponseText, 'ai');

        } catch (error) {
            const loadingMsg = document.getElementById('temp-loading');
            if (loadingMsg) loadingMsg.remove();
            
            const errorMsg = `Error connecting to API: ${error.message}.`;
            appendMessageHTML(errorMsg, 'ai');
        } finally {
            sendBtn.disabled = false;
        }
    }

    function appendMessageHTML(text, sender, id = null) {
        const wrapper = document.createElement('div');
        wrapper.classList.add('message-wrapper', sender);
        if (id) wrapper.id = id;

        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender === 'user' ? 'user-message' : 'ai-message');
        msgDiv.textContent = text;

        wrapper.appendChild(msgDiv);
        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Call Groq API via Fetch
    async function fetchGroqResponse(conversationHistory) {
        const apiMessages = conversationHistory.map(msg => ({
            role: msg.sender === 'user' ? 'user' : 'assistant',
            content: msg.text
        }));

        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${API_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: "groq/compound",
                messages: apiMessages,
                temperature: 1,
                max_completion_tokens: 1024,
                top_p: 1,
                compound_custom: {
                    tools: {
                        enabled_tools: [
                             "web_search",
        "code_interpreter",
        "visit_website"
                        ]
                    }
                }
            })
        });

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error?.message || `HTTP ${response.status}`);
        }

        const data = await response.json();
        return data.choices[0].message.content;
    }

    function deleteChat(id, event) {
        event.stopPropagation();
        if (chats.length === 1) {
            alert("You must keep at least one session active.");
            return;
        }

        chats = chats.filter(c => c.id !== id);
        if (currentChatId === id) {
            currentChatId = chats[0].id;
        }

        updateSidebar();
        loadChat(currentChatId);
    }

    function updateSidebar() {
        chatList.innerHTML = '';
        chats.forEach(chat => {
            const item = document.createElement('div');
            item.className = `chat-history-item ${chat.id === currentChatId ? 'active' : ''}`;
            item.id = `chat-item-${chat.id}`;
            item.setAttribute('onclick', `loadChat(${chat.id})`);
            
            item.innerHTML = `
                <span>💬 ${chat.title}</span>
                <button class="delete-chat-btn" onclick="deleteChat(${chat.id}, event)">🗑️</button>
            `;
            chatList.appendChild(item);
        });
    }
</script>

</body>
</html>
